<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Dark background with rounded corners -->
  <rect width="192" height="192" rx="44" fill="#2c2c2c"/>
  <!-- Three glaze layer bands — representing a stacked combo -->
  <rect x="22" y="44" width="148" height="32" rx="16" fill="#D4651E"/>
  <rect x="22" y="82" width="148" height="32" rx="16" fill="#5B9A8A"/>
  <rect x="22" y="120" width="148" height="32" rx="16" fill="#C8A84B"/>
  <!-- Small glaze drip from top band to middle -->
  <ellipse cx="76" cy="77" rx="7" ry="11" fill="#D4651E"/>
  <!-- Small glaze drip from middle to bottom -->
  <ellipse cx="116" cy="115" rx="7" ry="11" fill="#5B9A8A"/>
</svg>
